{% extends "base.html" %}
{% block title %}Login - IntelliDesk{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-icon">
                <i class="bi bi-robot"></i>
            </div>
            <h1>IntelliDesk</h1>
            <p>AI-Powered IT Helpdesk</p>
        </div>

        {% if error %}
        <div class="auth-error">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="id-label">Email address</label>
                <input type="email" name="email" class="id-input" placeholder="you@company.com" required>
            </div>
            <div class="mb-3">
                <label class="id-label">Password</label>
                <input type="password" name="password" class="id-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-id w-100 mt-2" style="padding: 0.7rem;">
                Sign in
            </button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size: 0.88rem; color: var(--id-text-muted);">
            Don't have an account?
            <a href="/register" style="color: var(--id-primary); font-weight: 600; text-decoration: none;">Register</a>
        </p>
    </div>
</div>
{% endblock %}
