{% extends "base.html" %}
{% block title %}Register - IntelliDesk{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="brand-icon">
                <i class="bi bi-robot"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join IntelliDesk IT Support</p>
        </div>

        {% if error %}
        <div class="auth-error">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success">{{ success }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="mb-3">
                <label class="id-label">Full name</label>
                <input type="text" name="name" class="id-input" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="id-label">Email address</label>
                <input type="email" name="email" class="id-input" placeholder="you@company.com" required>
            </div>
            <div class="mb-3">
                <label class="id-label">Password</label>
                <input type="password" name="password" class="id-input" placeholder="Minimum 6 characters" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="id-label">Confirm password</label>
                <input type="password" name="confirm_password" class="id-input" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn-id w-100 mt-2" style="padding: 0.7rem;">
                Create Account
            </button>
        </form>

        <p class="text-center mt-3 mb-0" style="font-size: 0.88rem; color: var(--id-text-muted);">
            Already have an account?
            <a href="/login" style="color: var(--id-primary); font-weight: 600; text-decoration: none;">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
